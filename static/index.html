<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Events Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-hover { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header -->
    <div class="bg-indigo-600 text-white py-10 px-4 text-center">
        <h1 class="text-4xl font-bold mb-2">🎟️ Local Events Finder</h1>
        <p class="text-indigo-200 text-lg">Discover upcoming events near you</p>
    </div>

    <!-- Search Bar -->
    <div class="max-w-3xl mx-auto mt-8 px-4">
        <div class="bg-white rounded-2xl shadow p-6">
            <div class="flex flex-col md:flex-row gap-3">
                <input
                    id="location"
                    type="text"
                    placeholder="City or zip code (e.g. Los Angeles)"
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                />
                <input
                    id="keyword"
                    type="text"
                    placeholder="Keyword (optional)"
                    class="flex-1 border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-400"
                />
                <select id="radius" class="border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    <option value="10">10 miles</option>
                    <option value="25" selected>25 miles</option>
                    <option value="50">50 miles</option>
                    <option value="100">100 miles</option>
                </select>
                <button
                    onclick="searchEvents()"
                    class="bg-indigo-600 text-white px-6 py-3 rounded-lg font-semibold hover:bg-indigo-700 transition"
                >
                    Search
                </button>
            </div>
        </div>
    </div>

    <!-- Results -->
    <div class="max-w-6xl mx-auto mt-8 px-4 pb-16">
        <div id="status" class="text-center text-gray-500 mt-12 hidden">
            <div class="text-5xl mb-4">🎭</div>
            <p class="text-xl">Search for events in your area to get started</p>
        </div>
        <div id="loading" class="text-center mt-12 hidden">
            <div class="inline-block animate-spin text-5xl">🎡</div>
            <p class="text-gray-500 mt-4">Finding events near you...</p>
        </div>
        <div id="error" class="text-center text-red-500 mt-12 hidden"></div>
        <div id="count" class="text-gray-600 font-medium mb-4 hidden"></div>
        <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        const categoryColors = {
            "Music": "bg-pink-100 text-pink-700",
            "Sports": "bg-green-100 text-green-700",
            "Arts & Theatre": "bg-purple-100 text-purple-700",
            "Film": "bg-yellow-100 text-yellow-700",
            "Miscellaneous": "bg-gray-100 text-gray-700",
            "default": "bg-indigo-100 text-indigo-700"
        };

        function getCategoryColor(category) {
            return categoryColors[category] || categoryColors["default"];
        }

        function formatDate(dateStr) {
            if (!dateStr || dateStr === "TBD") return "Date TBD";
            const date = new Date(dateStr + "T00:00:00");
            return date.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric", year: "numeric" });
        }

        function renderCard(event) {
            const colorClass = getCategoryColor(event.category);
            const image = event.image
                ? `<img src="${event.image}" alt="${event.name}" class="w-full h-48 object-cover" />`
                : `<div class="w-full h-48 bg-indigo-100 flex items-center justify-center text-5xl">🎟️</div>`;

            const price = event.price
                ? `<span class="text-green-600 font-semibold">${event.price}</span>`
                : `<span class="text-gray-400">Price TBD</span>`;

            const status = event.status === "onsale"
                ? `<span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full">On Sale</span>`
                : event.status === "offsale"
                ? `<span class="text-xs bg-red-100 text-red-700 px-2 py-1 rounded-full">Off Sale</span>`
                : "";

            return `
                <a href="${event.url}" target="_blank" class="card-hover bg-white rounded-2xl shadow overflow-hidden flex flex-col">
                    ${image}
                    <div class="p-4 flex flex-col flex-1">
                        <div class="flex items-start justify-between gap-2 mb-2">
                            <span class="text-xs font-medium px-2 py-1 rounded-full ${colorClass}">${event.category}${event.genre ? " · " + event.genre : ""}</span>
                            ${status}
                        </div>
                        <h2 class="font-bold text-gray-800 text-lg leading-tight mb-2">${event.name}</h2>
                        <div class="text-sm text-gray-500 space-y-1 mt-auto">
                            <div>📅 ${formatDate(event.date)}${event.time ? " · " + event.time : ""}</div>
                            <div>📍 ${event.venue} — ${event.address}</div>
                            <div class="mt-2">${price}</div>
                        </div>
                    </div>
                </a>
            `;
        }

        async function searchEvents() {
            const location = document.getElementById("location").value.trim();
            const keyword = document.getElementById("keyword").value.trim();
            const radius = document.getElementById("radius").value;

            if (!location) {
                alert("Please enter a city or zip code.");
                return;
            }

            document.getElementById("results").innerHTML = "";
            document.getElementById("count").classList.add("hidden");
            document.getElementById("error").classList.add("hidden");
            document.getElementById("status").classList.add("hidden");
            document.getElementById("loading").classList.remove("hidden");

            try {
                let url = `/api/events?location=${encodeURIComponent(location)}&radius=${radius}`;
                if (keyword) url += `&keyword=${encodeURIComponent(keyword)}`;

                const res = await fetch(url);
                const data = await res.json();

                document.getElementById("loading").classList.add("hidden");

                if (!res.ok) throw new Error(data.detail || "Something went wrong");

                const events = data.events;
                if (events.length === 0) {
                    document.getElementById("error").textContent = "No events found for that location. Try a different city or radius.";
                    document.getElementById("error").classList.remove("hidden");
                    return;
                }

                document.getElementById("count").textContent = `Found ${data.count} upcoming events`;
                document.getElementById("count").classList.remove("hidden");
                document.getElementById("results").innerHTML = events.map(renderCard).join("");

            } catch (err) {
                document.getElementById("loading").classList.add("hidden");
                document.getElementById("error").textContent = "Error: " + err.message;
                document.getElementById("error").classList.remove("hidden");
            }
        }

        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") searchEvents();
        });

        document.getElementById("status").classList.remove("hidden");
    </script>
</body>
</html>
